name: CI/CD Pipeline

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: "npm"
      - run: npm install
      - run: npm test

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Install Node.js if not present
            if ! command -v node &> /dev/null; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
              sudo apt-get install -y nodejs
            fi

            # Install PM2 if not present
            if ! command -v pm2 &> /dev/null; then
              sudo npm install -g pm2
            fi

            # Clone repo if directory doesn't exist, otherwise pull latest
            if [ ! -d "/var/www/node-backend/.git" ]; then
              sudo mkdir -p /var/www/node-backend
              sudo chown $USER:$USER /var/www/node-backend
              git clone https://github.com/${{ github.repository }}.git /var/www/node-backend
            else
              cd /var/www/node-backend && git pull origin main
            fi

            # Install dependencies and restart app
            cd /var/www/node-backend
            npm install --omit=dev
            pm2 restart node-backend || pm2 start server.js --name node-backend
            pm2 save
